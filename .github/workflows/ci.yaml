name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Vet Metal-tagged packages
        run: go vet -tags metal ./...

      - name: Test all packages
        run: go test ./...

      - name: Verify non-Darwin compile path
        run: GOOS=linux GOARCH=amd64 go test -exec=true ./...

      - name: Test Metal-tagged packages
        run: go test -tags metal ./...

      - name: Verify CLI and internal tests
        run: |
          go test -race ./cmd/gputrace/cmd -count=1
          go test -race ./internal/... -count=1

      - name: Verify release build path
        run: go build ./cmd/gputrace
